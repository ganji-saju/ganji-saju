<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>달빛인생 — 오늘 바로 보는 운세</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" />
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #fafafb;
    --ink: #111114;
    --ink-64: rgba(17, 17, 20, 0.64);
    --ink-44: rgba(17, 17, 20, 0.44);
    --ink-24: rgba(17, 17, 20, 0.24);
    --line: rgba(17, 17, 20, 0.08);
    --line-strong: rgba(17, 17, 20, 0.16);
    --pink: #ff4f9a;
    --pink-strong: #d81b72;
    --pink-soft: #fff0f7;
    --pink-tint: #ffe7f1;
    --yellow: #ffd54a;
    --moon: #f5e9c8;
    --night: #1c1b2a;
    --night-soft: #2a2840;
    --radius: 16px;
    --radius-lg: 22px;
    --radius-sm: 10px;
    --shadow-card: 0 1px 0 rgba(17,17,20,0.04), 0 8px 24px -12px rgba(17,17,20,0.10);
    --shadow-press: 0 2px 0 rgba(17,17,20,0.06), 0 14px 30px -14px rgba(255,79,154,0.35);
    --serif: "Gowun Batang", serif;
    --sans: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --dock-h: 72px;
    --header-h: 52px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: #efeef2;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    word-break: keep-all;
    line-break: strict;
    overscroll-behavior-y: none;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Phone viewport simulation when wider than mobile */
  .stage {
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    display: flex;
    align-items: stretch;
    justify-content: center;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255, 79, 154, 0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(120, 100, 220, 0.08), transparent 60%),
      #efeef2;
  }
  .app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 480px) {
    .app {
      margin: 24px 0;
      min-height: min(900px, calc(100dvh - 48px));
      max-height: 900px;
      border-radius: 32px;
      box-shadow: 0 20px 60px -20px rgba(17,17,20,0.18), 0 1px 0 rgba(17,17,20,0.04);
      overflow: hidden;
    }
  }

  /* Senior mode */
  .senior { font-size: 17px; }
  .senior .home-card-title { font-size: 17px; }
  .senior .chip { font-size: 15px; }
  .senior .nav-label { font-size: 12px; }

  /* Pink intensity variants */
  .pink-soft { --pink: #ff7eb3; --pink-strong: #e6549a; }
  .pink-bold { --pink: #ff2d83; --pink-strong: #b80f5b; }

  /* App header */
  .app-header {
    height: var(--header-h);
    padding: 0 16px;
    padding-top: var(--safe-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, #fff8d9 0%, #ffd479 45%, #f5b740 100%);
    box-shadow: inset -3px -3px 0 rgba(0,0,0,0.06), 0 0 0 2px #fff, 0 0 0 3px var(--line);
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    right: -3px; top: 1px;
    box-shadow: inset 1px 1px 0 var(--line);
  }
  .brand-name {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .login-btn {
    background: var(--yellow);
    color: #1f1a00;
    border: 0;
    height: 32px;
    padding: 0 12px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .icon-btn {
    width: 36px; height: 36px;
    background: transparent; border: 0;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--ink);
  }
  .icon-btn:active { background: var(--bg-soft); }

  /* Main scroll */
  .main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--dock-h) + var(--safe-bottom) + 16px);
    scrollbar-width: none;
  }
  .main::-webkit-scrollbar { display: none; }

  /* Bottom dock */
  .dock {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: calc(var(--dock-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: rgba(255,255,255,0.94);
    -webkit-backdrop-filter: saturate(160%) blur(14px);
    backdrop-filter: saturate(160%) blur(14px);
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    align-items: stretch;
    z-index: 40;
  }
  .nav-item {
    background: transparent; border: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px;
    color: var(--ink-44);
    height: var(--dock-h);
    transition: transform 120ms ease, color 120ms ease;
  }
  .nav-item.active { color: var(--ink); }
  .nav-item:active { transform: scale(0.94); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-label { font-size: 11px; font-weight: 600; letter-spacing: -0.01em; }
  .nav-fab {
    position: relative;
    margin-top: -22px;
  }
  .nav-fab .fab {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink) 0%, var(--pink-strong) 100%);
    color: #fff;
    display: grid; place-items: center;
    box-shadow: 0 8px 22px -6px rgba(255, 79, 154, 0.55), 0 1px 0 rgba(255,255,255,0.3) inset;
  }
  .nav-fab .fab svg { width: 26px; height: 26px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    height: 48px;
    padding: 0 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    border: 0;
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  .btn-pink {
    background: var(--pink);
    color: #fff;
    box-shadow: var(--shadow-press);
  }
  .btn-pink:active { transform: translateY(1px); background: var(--pink-strong); }
  .btn-ink { background: var(--ink); color: #fff; }
  .btn-ink:active { transform: translateY(1px); }
  .btn-ghost { background: var(--bg-soft); color: var(--ink); border: 1px solid var(--line); }
  .btn-block { width: 100%; }

  /* Chips */
  .chip {
    height: 34px;
    padding: 0 14px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-64);
    display: inline-flex; align-items: center; gap: 6px;
    flex-shrink: 0;
    transition: all 120ms ease;
  }
  .chip.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .chip:active { transform: scale(0.97); }

  /* Cards */
  .card {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-card);
  }

  /* Section title */
  .section-title {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .section-title .sub {
    font-size: 12px;
    color: var(--ink-44);
    font-weight: 500;
    margin-left: 6px;
  }

  /* Utility animations */
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { opacity: 0; transform: scale(0.9); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }
  @keyframes float-y {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .rise { animation: rise 360ms cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .rise-stagger > * { animation: rise 420ms cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .rise-stagger > *:nth-child(1) { animation-delay: 40ms; }
  .rise-stagger > *:nth-child(2) { animation-delay: 110ms; }
  .rise-stagger > *:nth-child(3) { animation-delay: 180ms; }
  .rise-stagger > *:nth-child(4) { animation-delay: 250ms; }
  .rise-stagger > *:nth-child(5) { animation-delay: 320ms; }
  .rise-stagger > *:nth-child(6) { animation-delay: 390ms; }
  .rise-stagger > *:nth-child(7) { animation-delay: 460ms; }
  .rise-stagger > *:nth-child(8) { animation-delay: 530ms; }

  /* Page transition */
  .page {
    animation: fadein 220ms ease both;
  }

  /* Sheet / modal */
  .sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(17,17,20,0.42);
    z-index: 60;
    animation: fadein 200ms ease both;
  }
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: #fff;
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    z-index: 61;
    padding: 8px 20px calc(20px + var(--safe-bottom));
    animation: sheetUp 280ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    max-height: 88%;
    overflow-y: auto;
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--line-strong);
    border-radius: 999px;
    margin: 8px auto 12px;
  }

  /* Toast */
  .toast {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: calc(var(--dock-h) + var(--safe-bottom) + 16px);
    background: rgba(17,17,20,0.92);
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    z-index: 50;
    animation: rise 240ms ease both;
  }

  /* Skeleton shimmer */
  .skeleton {
    background:
      linear-gradient(90deg, #f0f0f3 0%, #f7f7fa 50%, #f0f0f3 100%);
    background-size: 400px 100%;
    animation: shimmer 1.4s linear infinite;
  }

  /* SVG placeholder character */
  .ch-circle {
    border-radius: 50%;
    display: grid; place-items: center;
    color: #fff;
    font-weight: 800;
    font-family: var(--serif);
    font-size: 18px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08), inset 0 2px 0 rgba(255,255,255,0.2);
    position: relative;
    flex-shrink: 0;
  }
  .ch-circle .ph {
    position: absolute;
    bottom: -3px; right: -3px;
    background: #fff;
    color: var(--ink-44);
    border-radius: 999px;
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 7px;
    font-weight: 600;
    padding: 1px 4px;
    border: 1px solid var(--line);
    line-height: 1;
  }

  /* Helpers */
  .row { display: flex; align-items: center; gap: 8px; }
  .col { display: flex; flex-direction: column; }
  .grow { flex: 1; }
  .px-20 { padding-left: 20px; padding-right: 20px; }
  .py-20 { padding-top: 20px; padding-bottom: 20px; }
  .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; } .mt-20 { margin-top: 20px; } .mt-24 { margin-top: 24px; } .mt-28 { margin-top: 28px; }
  .text-sub { color: var(--ink-64); }
  .text-mute { color: var(--ink-44); }
  .text-pink { color: var(--pink-strong); }

  /* Hide scrollbars on horizontal chip rows */
  .hscroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 20px;
    scrollbar-width: none;
  }
  .hscroll::-webkit-scrollbar { display: none; }

  /* Tweaks button override (host adds its own toggle in toolbar) */
  .floating-tweaks-toggle { display: none; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tweaks helper -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Shared atoms -->
  <script type="text/babel" src="src/atoms.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>

  <!-- Pages -->
  <script type="text/babel" src="src/page-home.jsx"></script>
  <script type="text/babel" src="src/page-today.jsx"></script>
  <script type="text/babel" src="src/page-tarot.jsx"></script>
  <script type="text/babel" src="src/page-saju.jsx"></script>
  <script type="text/babel" src="src/page-gunghap.jsx"></script>
  <script type="text/babel" src="src/page-zodiac.jsx"></script>
  <script type="text/babel" src="src/page-chat.jsx"></script>
  <script type="text/babel" src="src/page-vault.jsx"></script>
  <script type="text/babel" src="src/page-free.jsx"></script>
  <script type="text/babel" src="src/page-daewoon.jsx"></script>
  <script type="text/babel" src="src/page-taekil.jsx"></script>
  <script type="text/babel" src="src/page-pay-auth.jsx"></script>

  <!-- Main app -->
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
