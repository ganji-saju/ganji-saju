name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke E2E (Phase 2A 인증 X)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      # 인증 필요 없는 public 페이지 (홈/pricing/membership/compatibility/input) smoke 만 실행.
      # 인증 필요 페이지는 Phase 2B 의 e2e/auth.spec.ts 에서 별도 fixture 로 처리.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: @tosspayments/payment-widget-sdk peer (typescript 4.x) vs package.json (typescript ^5) 충돌 우회
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
