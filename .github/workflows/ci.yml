name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      KASI_SERVICE_KEY: ${{ secrets.KASI_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: @tosspayments/payment-widget-sdk peer (typescript 4.x) vs package.json (typescript ^5) 충돌 우회
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test

      - name: Audit dead anchors (PR #183 회귀 차단)
        run: npm run audit:dead-anchors:strict

      - name: Audit mockup placeholders (PR #194 회귀 차단 — credits 잔액 binding 누락 류)
        run: npm run audit:mockup-placeholders:strict

      - name: Audit redesign coverage (PR #198/#206/#207 류 — 구스타일 named CSS class 회귀 차단)
        run: npm run audit:redesign-coverage:strict

      # 2026-06-21 — lucky 오행 분기 정적 가드(코드 기반, DB 불필요)를 CI 에 편입.
      # payment-idempotency·ai-chat-idempotency·lifetime-report 는 DB 데이터 감사라
      # 운영 super_admin 트리거/스케줄로 별도 운영(prod service_role 의 CI 반입 금지 정책).
      - name: Audit lucky hybrid (오행 분기 회귀 차단)
        run: npm run audit:lucky-hybrid:strict

      # 2026-06-22 — PR #448 회귀 차단: 마이그레이션 번호 중복(049 충돌 류)을
      # PR 단계에서 검출. 동일 버전 문자열이면 supabase 가 두 번째를 영구 skip →
      # 테이블 무성 미생성(타로 보관함 데드). 정적 검사(파일명만, DB 불필요).
      - name: Audit migration numbers (PR #448 번호 충돌 회귀 차단)
        run: npm run audit:migration-numbers:strict

      - name: Validate KASI calendar samples
        if: ${{ env.KASI_SERVICE_KEY != '' }}
        run: npm run validate:kasi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
