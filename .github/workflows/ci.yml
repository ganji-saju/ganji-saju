name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      KASI_SERVICE_KEY: ${{ secrets.KASI_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: @tosspayments/payment-widget-sdk peer (typescript 4.x) vs package.json (typescript ^5) 충돌 우회
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test

      - name: Audit dead anchors (PR #183 회귀 차단)
        run: npm run audit:dead-anchors:strict

      - name: Audit mockup placeholders (PR #194 회귀 차단 — credits 잔액 binding 누락 류)
        run: npm run audit:mockup-placeholders:strict

      - name: Validate KASI calendar samples
        if: ${{ env.KASI_SERVICE_KEY != '' }}
        run: npm run validate:kasi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
